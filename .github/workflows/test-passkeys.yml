name: Test DocuMio passkeys

on:
  push:
    branches:
      - feature/passkeys-test
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-passkeys:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/passkeys-test

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install supported Supabase client
        run: npm install @supabase/supabase-js@^2.105.0

      - name: Add passkey implementation
        run: |
          cat > lib/supabase.ts <<'EOF'
          import { createClient, type SupabaseClient } from "@supabase/supabase-js";

          let supabaseClient: SupabaseClient | null = null;

          export function getSupabaseClient() {
            const url = process.env.NEXT_PUBLIC_SUPABASE_URL;
            const key = process.env.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY;

            if (!url || !key) return null;

            if (!supabaseClient) {
              supabaseClient = createClient(url, key, {
                auth: {
                  experimental: { passkey: true },
                },
              });
            }

            return supabaseClient;
          }
          EOF

          cat > app/PasskeyControls.tsx <<'EOF'
          "use client";

          import { useEffect, useState } from "react";
          import { Fingerprint } from "lucide-react";
          import { getSupabaseClient } from "@/lib/supabase";

          export default function PasskeyControls() {
            const [signedIn, setSignedIn] = useState<boolean | null>(null);
            const [busy, setBusy] = useState(false);
            const [supported, setSupported] = useState(false);

            useEffect(() => {
              setSupported(typeof window !== "undefined" && "PublicKeyCredential" in window);
              const supabase = getSupabaseClient();
              if (!supabase) {
                setSignedIn(false);
                return;
              }

              void supabase.auth.getSession().then(({ data }) => setSignedIn(Boolean(data.session)));
              const { data } = supabase.auth.onAuthStateChange((_event, session) => {
                setSignedIn(Boolean(session));
              });
              return () => data.subscription.unsubscribe();
            }, []);

            if (!supported || signedIn === null) return null;

            async function handlePasskey() {
              const supabase = getSupabaseClient();
              if (!supabase || busy) return;

              setBusy(true);
              try {
                const { error } = signedIn
                  ? await supabase.auth.registerPasskey()
                  : await supabase.auth.signInWithPasskey();

                if (error) {
                  const message = error.message.toLowerCase();
                  if (!message.includes("cancel") && !message.includes("abort")) {
                    window.alert(error.message);
                  }
                  return;
                }

                if (signedIn) {
                  window.alert("Face ID attivato. Da ora puoi accedere senza password.");
                }
              } finally {
                setBusy(false);
              }
            }

            return (
              <button
                type="button"
                onClick={() => void handlePasskey()}
                disabled={busy}
                aria-label={signedIn ? "Attiva Face ID" : "Accedi con Face ID"}
                title={signedIn ? "Attiva Face ID" : "Accedi con Face ID"}
                style={{
                  position: "fixed",
                  right: 18,
                  bottom: 18,
                  zIndex: 9999,
                  display: "flex",
                  alignItems: "center",
                  gap: 8,
                  border: "1px solid #111827",
                  borderRadius: 999,
                  padding: "12px 16px",
                  background: "#111827",
                  color: "white",
                  fontWeight: 800,
                  boxShadow: "0 12px 28px rgba(15, 23, 42, 0.28)",
                  opacity: busy ? 0.7 : 1,
                }}
              >
                <Fingerprint size={20} />
                <span>{busy ? "Attendi…" : signedIn ? "Attiva Face ID" : "Accedi con Face ID"}</span>
              </button>
            );
          }
          EOF

          python3 - <<'PY'
          from pathlib import Path
          path = Path('app/layout.tsx')
          text = path.read_text()
          if 'import PasskeyControls from "./PasskeyControls";' not in text:
              text = text.replace('import PracticeVisibility from "./PracticeVisibility";\n', 'import PracticeVisibility from "./PracticeVisibility";\nimport PasskeyControls from "./PasskeyControls";\n')
          if '<PasskeyControls />' not in text:
              text = text.replace('        <PracticeVisibility />\n', '        <PracticeVisibility />\n        <PasskeyControls />\n')
          path.write_text(text)
          PY

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: test-key
        run: npm run build

      - name: Commit verified implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json lib/supabase.ts app/PasskeyControls.tsx app/layout.tsx
          git commit -m "feat: add verified Face ID passkeys" || exit 0
          git push
