name: Apply 20 MB smart upload

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[20mb-smart-upload-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Enable private Storage analysis for large files
        shell: python
        run: |
          from pathlib import Path

          path = Path('app/page.tsx')
          text = path.read_text(encoding='utf-8')

          old_request = '''  async function requestAnalysis(
    candidateDocuments: ReturnType<typeof serializeCandidateDocuments> = [],
    mode: "document" | "attachment" = "document",
  ) {
    if (!file) {
      throw new Error(language === "it" ? "File mancante." : "Missing file.");
    }

    const formData = new FormData();
    formData.append("file", file);
    formData.append("userNote", note);
    formData.append("language", language);
    formData.append("mode", mode);
    formData.append("candidateDocuments", JSON.stringify(candidateDocuments));

    const response = await fetch("/api/analyze", {
      method: "POST",
      headers: await getApiAuthHeaders(),
      body: formData,
    });

    const data = (await response.json()) as SmartAnalysis & {
      error?: string;
    };

    if (!response.ok) {
      throw new Error(data.error || "Analysis failed");
    }

    return data;
  }
'''

          new_request = '''  async function requestAnalysis(
    candidateDocuments: ReturnType<typeof serializeCandidateDocuments> = [],
    mode: "document" | "attachment" = "document",
  ) {
    if (!file) {
      throw new Error(language === "it" ? "File mancante." : "Missing file.");
    }

    const maxFileBytes = 20 * 1024 * 1024;
    const directAnalysisBytes = 4 * 1024 * 1024;

    if (file.size > maxFileBytes) {
      throw new Error(
        language === "it"
          ? "Il file supera 20 MB. Scegli un file più piccolo."
          : "The file is larger than 20 MB. Choose a smaller file.",
      );
    }

    let temporaryStoragePath: string | null = null;

    try {
      let response: Response;

      if (file.size > directAnalysisBytes) {
        const supabase = getSupabaseClient();
        if (!supabase) {
          throw new Error(t.notConfigured);
        }

        const {
          data: { user },
          error: userError,
        } = await supabase.auth.getUser();

        if (userError || !user) {
          throw new Error(t.invalidSession);
        }

        const safeName = file.name
          .normalize("NFKD")
          .replace(/[^a-zA-Z0-9._-]+/g, "-")
          .replace(/-+/g, "-");
        temporaryStoragePath = `${user.id}/analisi-temporanea/${crypto.randomUUID()}-${safeName}`;

        const { error: uploadError } = await supabase.storage
          .from("documents")
          .upload(temporaryStoragePath, file, {
            cacheControl: "3600",
            contentType: file.type || undefined,
            upsert: false,
          });

        if (uploadError) {
          throw new Error(uploadError.message);
        }

        response = await fetch("/api/analyze", {
          method: "POST",
          headers: await getApiAuthHeaders("application/json"),
          body: JSON.stringify({
            storagePath: temporaryStoragePath,
            fileName: file.name,
            userNote: note,
            language,
            mode,
            candidateDocuments,
          }),
        });
      } else {
        const formData = new FormData();
        formData.append("file", file);
        formData.append("userNote", note);
        formData.append("language", language);
        formData.append("mode", mode);
        formData.append("candidateDocuments", JSON.stringify(candidateDocuments));

        response = await fetch("/api/analyze", {
          method: "POST",
          headers: await getApiAuthHeaders(),
          body: formData,
        });
      }

      const data = (await response.json()) as SmartAnalysis & {
        error?: string;
      };

      if (!response.ok) {
        throw new Error(data.error || "Analysis failed");
      }

      return data;
    } finally {
      if (temporaryStoragePath) {
        const supabase = getSupabaseClient();
        if (supabase) {
          const { error: cleanupError } = await supabase.storage
            .from("documents")
            .remove([temporaryStoragePath]);
          if (cleanupError) {
            console.warn(
              "Pulizia file temporaneo non riuscita:",
              cleanupError.message,
            );
          }
        }
      }
    }
  }
'''

          old_limit = '''      if (file.size > 4 * 1024 * 1024) {
        throw new Error(
          language === "it"
            ? "Il file supera 4 MB. Scegli un file più piccolo."
            : "The file is larger than 4 MB. Choose a smaller file.",
        );
      }

'''

          if text.count(old_request) != 1:
            raise SystemExit(f'Expected one requestAnalysis block, found {text.count(old_request)}')
          if text.count(old_limit) != 1:
            raise SystemExit(f'Expected one 4 MB limit block, found {text.count(old_limit)}')

          text = text.replace(old_request, new_request, 1)
          text = text.replace(old_limit, '', 1)
          path.write_text(text, encoding='utf-8')

          Path('.github/workflows/apply-smart-upload-20mb.yml').unlink()

      - name: Commit the application fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Enable 20 MB smart uploads via private Storage [20mb-smart-upload-applied]"
          git push origin main
