name: Strict practice summary patch

on:
  push:
    branches:
      - fix/strict-practice-summary-scope

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[strict-summary-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/strict-practice-summary-scope
          fetch-depth: 0

      - name: Restrict summary mode to selected practice
        shell: python
        run: |
          from pathlib import Path

          path = Path('app/api/assistant/route.ts')
          text = path.read_text(encoding='utf-8')

          old_ranked = '''    const rankedDocuments = structuredDocuments
      .filter((item) => item.score > 0 || terms.length === 0)
      .sort((a, b) => b.score - a.score)
      .slice(0, summaryMode ? 30 : 50);

    const candidateFiles = archiveFiles
      .filter(
        (file) =>
          file.storagePath &&
          file.storagePath.startsWith(`${user.id}/`) &&
          (file.score > 0 || terms.length === 0),
      )
      .sort((a, b) => b.score - a.score);
'''

          new_ranked = '''    const selectedPracticeIds = new Set(
      summaryMode
        ? rankedPractices.slice(0, 1).map(({ practice }) => practice.id)
        : [],
    );

    const rankedDocuments = structuredDocuments
      .filter((item) =>
        summaryMode
          ? selectedPracticeIds.has(item.practiceId ?? "")
          : item.score > 0 || terms.length === 0,
      )
      .sort((a, b) => b.score - a.score)
      .slice(0, summaryMode ? 30 : 50);

    const candidateFiles = archiveFiles
      .filter(
        (file) =>
          file.storagePath &&
          file.storagePath.startsWith(`${user.id}/`) &&
          (summaryMode
            ? selectedPracticeIds.has(file.practiceId ?? "")
            : file.score > 0 || terms.length === 0),
      )
      .sort((a, b) => b.score - a.score);
'''

          old_practices = '''      practices: rankedPractices.map(({ practice, linked }) => ({'''
          new_practices = '''      practices: (summaryMode ? rankedPractices.slice(0, 1) : rankedPractices).map(({ practice, linked }) => ({'''

          old_rule = '''- Scegli una sola pratica, quella più pertinente.\\n- Usa questo ordine:'''
          new_rule = '''- Scegli una sola pratica, quella più pertinente.\\n- Usa esclusivamente documenti, allegati, importi e scadenze collegati a quella pratica; ignora completamente ogni elemento esterno.\\n- Non citare mai un documento che non compare tra i documenti della pratica selezionata.\\n- Usa questo ordine:'''

          if old_ranked not in text:
            raise SystemExit('Target ranked block not found')
          if old_practices not in text:
            raise SystemExit('Target practices block not found')
          if old_rule not in text:
            raise SystemExit('Target summary rule not found')

          text = text.replace(old_ranked, new_ranked, 1)
          text = text.replace(old_practices, new_practices, 1)
          text = text.replace(old_rule, new_rule, 1)
          path.write_text(text, encoding='utf-8')

          workflow = Path('.github/workflows/strict-practice-summary-patch.yml')
          workflow.unlink()

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Restrict practice summaries to linked records [strict-summary-applied]"
          git push origin fix/strict-practice-summary-scope
